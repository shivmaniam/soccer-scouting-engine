version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../mlflow:/app/mlflow
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlflow

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: streamlit
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    volumes:
      - ../mlflow:/mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow && mlflow ui
               --backend-store-uri /mlflow
               --host 0.0.0.0
               --port 5000"
