name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src api app

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true   # don't block CI if token not set

  smoke-pipeline:
    name: Smoke Pipeline (3 matches)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest (3 matches, La Liga 2020/21)
        run: |
          python -m src.ingest \
            --competition-id 11 \
            --season-id 90 \
            --max-matches 3

      - name: Build features
        run: |
          python -m src.features \
            --competition-id 11 \
            --season-id 90 \
            --min-minutes 45

      - name: Train model
        run: python -m src.model --epochs 2 --no-mlflow

      - name: Generate embeddings
        run: python -m src.embed

      - name: Build index
        run: python -m src.search --build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile --target api -t scouting-api .
      - name: Build Streamlit image
        run: docker build -f docker/Dockerfile --target streamlit -t scouting-app .
